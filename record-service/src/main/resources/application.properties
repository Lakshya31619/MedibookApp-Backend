server.port=8088
spring.application.name=record-service

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medibook_record?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT secret MUST match auth-service default exactly
app.jwt.secret=${JWT_SECRET:MediBookSuperSecretKeyForJWTSigningMustBe256BitsLong!}
app.jwt.expiration-ms=${JWT_EXPIRY:86400000}

# FIX: added /api suffix — notification-service has server.servlet.context-path=/api
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8087/api}
appointment.service.url=${APPOINTMENT_SERVICE_URL:http://localhost:8084/api}

logging.level.com.medibook=INFO

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true