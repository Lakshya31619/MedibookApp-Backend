server.port=8083
spring.application.name=schedule-service

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medibook_schedule?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:changeme-set-this-in-local-properties}
app.jwt.expiration-ms=${JWT_EXPIRY:86400000}

spring.quartz.job-store-type=memory

logging.level.com.medibook=INFO