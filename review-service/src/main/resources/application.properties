# ─────────────────────────────────────────────────────
# MediBook — Review / Rating Service
# SAFE TO PUSH TO GITHUB — no secrets here
# ─────────────────────────────────────────────────────

server.port=8086
spring.application.name=review-service

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medibook_review?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:changeme-set-this-in-local-properties}
app.jwt.expiration-ms=${JWT_EXPIRY:86400000}

# After a review is submitted, review-service updates provider avgRating
provider.service.url=${PROVIDER_SERVICE_URL:http://localhost:8082}

logging.level.com.medibook=INFO
