spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

app.jwt.secret=test-secret-key-must-be-at-least-32-characters-long-x
app.jwt.expiration-ms=3600000

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.cache.CacheAutoConfiguration
spring.cache.type=none

eureka.client.enabled=false
eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false

spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test

app.verification.code.expiry-minutes=10
app.mail.from=noreply@test.com
app.frontend.oauth2-callback-url=http://localhost:3000/oauth2/callback