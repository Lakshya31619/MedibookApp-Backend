server.port=${SERVER_PORT:8081}
spring.application.name=auth-service

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/medibook_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:MediBookSuperSecretKeyForJWTSigningMustBe256BitsLong!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
=
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-dev-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-dev-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8081/login/oauth2/code/google}

eureka.client.service-url.defaultZone=${EUREKA_SERVICE_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=2000ms
spring.cache.type=redis

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@medibook.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:noreply@medibook.com}
app.verification.code.expiry-minutes=10

app.frontend.oauth2-callback-url=${FRONTEND_URL:http://localhost:3000}/oauth2/callback

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

logging.level.com.medibook=INFO
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN