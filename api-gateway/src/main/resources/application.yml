server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:

        # ── Auth Service (port 8081) ──────────────────────────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # ── Auth Service OAuth2 ───────────────────────────────────────────
        - id: auth-service-oauth2
          uri: lb://auth-service
          predicates:
            - Path=/oauth2/**
          filters:
            - StripPrefix=0

        # ── Auth Service OAuth2 Callback ──────────────────────────────────
        - id: auth-service-oauth2-callback
          uri: lb://auth-service
          predicates:
            - Path=/login/oauth2/**
          filters:
            - StripPrefix=0

        # ── Auth Service OpenAPI docs (no context-path on auth-service) ───
        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/v3/api-docs/auth-service
          filters:
            - RewritePath=/v3/api-docs/auth-service, /v3/api-docs

        # ── Provider Service (port 8082) ──────────────────────────────────
        - id: provider-service
          uri: lb://provider-service
          predicates:
            - Path=/api/providers/**
          filters:
            - StripPrefix=0

        # ── Provider Service OpenAPI docs ─────────────────────────────────
        - id: provider-service-docs
          uri: lb://provider-service
          predicates:
            - Path=/v3/api-docs/provider-service
          filters:
            - RewritePath=/v3/api-docs/provider-service, /api/v3/api-docs

        # ── Schedule Service (port 8083) ──────────────────────────────────
        - id: schedule-service
          uri: lb://schedule-service
          predicates:
            - Path=/api/slots/**
          filters:
            - StripPrefix=0

        # ── Schedule Service OpenAPI docs ─────────────────────────────────
        - id: schedule-service-docs
          uri: lb://schedule-service
          predicates:
            - Path=/v3/api-docs/schedule-service
          filters:
            - RewritePath=/v3/api-docs/schedule-service, /api/v3/api-docs

        # ── Appointment Service (port 8084) ───────────────────────────────
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/appointments/**
          filters:
            - StripPrefix=0

        # ── Appointment Service OpenAPI docs ──────────────────────────────
        - id: appointment-service-docs
          uri: lb://appointment-service
          predicates:
            - Path=/v3/api-docs/appointment-service
          filters:
            - RewritePath=/v3/api-docs/appointment-service, /api/v3/api-docs

        # ── Payment Service (port 8085) ───────────────────────────────────
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0

        # ── Payment Service OpenAPI docs ──────────────────────────────────
        - id: payment-service-docs
          uri: lb://payment-service
          predicates:
            - Path=/v3/api-docs/payment-service
          filters:
            - RewritePath=/v3/api-docs/payment-service, /api/v3/api-docs

        # ── Review Service (port 8086) ────────────────────────────────────
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**
          filters:
            - StripPrefix=0

        # ── Review Service OpenAPI docs ───────────────────────────────────
        - id: review-service-docs
          uri: lb://review-service
          predicates:
            - Path=/v3/api-docs/review-service
          filters:
            - RewritePath=/v3/api-docs/review-service, /api/v3/api-docs

        # ── Notification Service (port 8087) ──────────────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0

        # ── Notification Service OpenAPI docs ─────────────────────────────
        - id: notification-service-docs
          uri: lb://notification-service
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - RewritePath=/v3/api-docs/notification-service, /api/v3/api-docs

        # ── Record Service (port 8088) ────────────────────────────────────
        - id: record-service
          uri: lb://record-service
          predicates:
            - Path=/api/records/**
          filters:
            - StripPrefix=0

        # ── Record Service OpenAPI docs ───────────────────────────────────
        - id: record-service-docs
          uri: lb://record-service
          predicates:
            - Path=/v3/api-docs/record-service
          filters:
            - RewritePath=/v3/api-docs/record-service, /api/v3/api-docs

# ── Eureka Client ─────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# ── JWT ───────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:MediBookSuperSecretKeyForJWTSigningMustBe256BitsLong!}

# ── Springdoc Swagger Aggregation ─────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: auth-service
        url: /v3/api-docs/auth-service
      - name: provider-service
        url: /v3/api-docs/provider-service
      - name: schedule-service
        url: /v3/api-docs/schedule-service
      - name: appointment-service
        url: /v3/api-docs/appointment-service
      - name: payment-service
        url: /v3/api-docs/payment-service
      - name: review-service
        url: /v3/api-docs/review-service
      - name: notification-service
        url: /v3/api-docs/notification-service
      - name: record-service
        url: /v3/api-docs/record-service
  api-docs:
    enabled: true
  webjars:
    prefix: ""

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    com.medibook: INFO
    org.springframework.cloud.gateway: INFO