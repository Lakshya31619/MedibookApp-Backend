# ─────────────────────────────────────────────────────
# MediBook — Notification Service
# SAFE TO PUSH TO GITHUB — no secrets here
# ─────────────────────────────────────────────────────

server.port=8087
spring.application.name=notification-service

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medibook_notification?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:changeme-set-this-in-local-properties}
app.jwt.expiration-ms=${JWT_EXPIRY:86400000}

# Email — set real credentials in local properties
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Sender display name
app.mail.from=${MAIL_FROM:noreply@medibook.com}
app.mail.from-name=MediBook

logging.level.com.medibook=INFO
