server.port=8082
spring.application.name=provider-service

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medibook_provider?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:changeme-set-this-in-local-properties}
app.jwt.expiration-ms=${JWT_EXPIRY:86400000}

auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8087}

logging.level.com.medibook=INFO