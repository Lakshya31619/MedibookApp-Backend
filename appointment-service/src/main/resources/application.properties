server.port=8084
spring.application.name=appointment-service

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/medibook_appointment?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:changeme-set-this-in-local-properties}
app.jwt.expiration-ms=${JWT_EXPIRY:86400000}

provider.service.url=${http://localhost:8082}
schedule.service.url=${SCHEDULE_SERVICE_URL:http://localhost:8083}
payment.service.url=${PAYMENT_SERVICE_URL:http://localhost:8085}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8087}

logging.level.com.medibook=INFO

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true